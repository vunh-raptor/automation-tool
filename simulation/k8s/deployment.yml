# Sample Kubernetes manifest for the "environments" repo.
# Place it at  sd-automation-hub/deployment.yml  on branch  sd-automation-hub-release.
# The `deploy` stage rewrites the image TAG on the marked line below.
#
# Default image prefix is localhost:5000 to match the recommended Track A flow,
# where the image is sideloaded with `kind load docker-image` (so the registry
# prefix is cosmetic and never actually pulled). For Track B the deploy stage's
# sed rewrites the whole image line to registry.local:5000 anyway.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sd-automation-hub
  labels:
    app: sd-automation-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sd-automation-hub
  template:
    metadata:
      labels:
        app: sd-automation-hub
    spec:
      containers:
        - name: sd-automation-hub
          # >>> the deploy stage's `sed` rewrites the tag on THIS line <<<
          image: localhost:5000/service_desk/sd-automation-hub:v0.0.0
          imagePullPolicy: IfNotPresent        # use the image preloaded via `kind load`
          ports:
            - containerPort: 8501
          envFrom:
            - secretRef:
                name: sd-automation-hub-secrets  # simulates Vault-injected config
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: sd-automation-hub
spec:
  type: NodePort
  selector:
    app: sd-automation-hub
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30085     # mapped to host localhost:8501 by kind-cluster.yaml
