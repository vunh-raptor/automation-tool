# LAB variant of the production pipeline. Copy this over .gitlab-ci.yml for a
# Track B end-to-end rehearsal. Differences from production:
#   * REGISTRY points at the local standalone registry (registry.local:5000)
#   * DinD runs WITHOUT TLS and allows the insecure local registry
#   * no corporate proxy build-args
#   * no `tags: [vn-small]` (the lab runner runs untagged jobs)
stages:
  - verify
  - build
  - deploy

variables:
  REGISTRY: "registry.local:5000"
  IMAGE_PATH: "service_desk/sd-automation-hub"

# ── verify (every push) ─────────────────────────────────────
verify_streamlit_setup:
  stage: verify
  image: python:3.12
  script:
    - python --version
    - pip install --no-cache-dir -r requirements.txt
    - streamlit --version
    - python -m py_compile main_site.py

# ── build & push image (on git tag) ─────────────────────────
build-app:
  stage: build
  only: [tags]
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
      command: ["--insecure-registry", "registry.local:5000"]
  variables:
    DOCKER_TLS_CERTDIR: ""              # disable TLS for the lab
    DOCKER_HOST: "tcp://docker:2375"
  script:
    - docker build --build-arg BUILD_VERSION=$CI_COMMIT_TAG -t $REGISTRY/$IMAGE_PATH:$CI_COMMIT_TAG .
    - docker push $REGISTRY/$IMAGE_PATH:$CI_COMMIT_TAG

# ── deploy via GitOps tag bump (on git tag) ─────────────────
deploy-app:
  stage: deploy
  only: [tags]
  image: docker:24.0.5
  variables:
    DEPLOY_REPO: "http://gitlab-ci-token:${GITLAB_PF_TOKEN}@gitlab.local:8080/root/sd-automation-hub-env.git"
    GIT_STRATEGY: none
  before_script:
    - apk add --no-cache git
  script:
    - git clone $DEPLOY_REPO /tmp/env
    - cd /tmp/env
    - git checkout sd-automation-hub-release
    - >
      sed -i
      "s|image: ${REGISTRY}/${IMAGE_PATH}:.*|image: ${REGISTRY}/${IMAGE_PATH}:${CI_COMMIT_TAG}|"
      ./sd-automation-hub/deployment.yml
    - git config user.name "sdah-ci"
    - git config user.email "sdah-ci@lab.local"
    - git add ./sd-automation-hub/deployment.yml
    - git diff --cached --quiet || (git commit -m "Deploy sd-automation-hub:${CI_COMMIT_TAG}" && git push origin sd-automation-hub-release)
