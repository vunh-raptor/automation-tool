services:
  automation-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: sd-automation-hub:latest
    container_name: sd-automation-hub
    ports:
      - "8501:8501"
    env_file:
      - .env
    shm_size: "1gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
