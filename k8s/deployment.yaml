apiVersion: apps/v1
kind: Deployment
metadata:
  name: sd-automation-hub
  namespace: automation-hub
  labels:
    app.kubernetes.io/name: sd-automation-hub
spec:
  # Streamlit keeps per-user state in server memory, so sessions are sticky to a
  # single pod. Keep one replica unless a sticky-session ingress is configured.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sd-automation-hub
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sd-automation-hub
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: sd-automation-hub
          # Replace with your registry/image:tag (e.g. pushed by CI).
          image: ghcr.io/vunh-raptor/automation-tool:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8501
          envFrom:
            - configMapRef:
                name: sd-automation-hub-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1536Mi"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # Chromium can exhaust the default 64Mi /dev/shm and crash.
            - name: dshm
              mountPath: /dev/shm
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: tmp
          emptyDir: {}
