apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sd-automation-hub
  namespace: automation-hub
  labels:
    app.kubernetes.io/name: sd-automation-hub
  annotations:
    # Streamlit relies on a long-lived WebSocket (/_stcore/stream); give it room.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Streamlit keeps session state in-pod, so pin clients to one backend.
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "sd-automation-hub"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
spec:
  ingressClassName: nginx
  rules:
    # Change this host to your own DNS name.
    - host: automation-hub.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sd-automation-hub
                port:
                  number: 80
  # Uncomment and configure to enable TLS via cert-manager or an existing secret.
  # tls:
  #   - hosts:
  #       - automation-hub.example.com
  #     secretName: sd-automation-hub-tls
