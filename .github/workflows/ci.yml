name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  verify-requirements:
    name: Verify requirements & build (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      DISPLAY: ":99"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies for pyautogui
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-tk python3-dev scrot xvfb \
            libxkbcommon0 libgbm1

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 1

      - name: Upgrade pip tooling
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install Python requirements
        run: pip install --no-cache-dir -r requirements.txt

      - name: Show installed versions
        run: |
          python --version
          streamlit --version
          pip list

      - name: Byte-compile project sources
        run: |
          python -m compileall -q main_site.py Activity Common Request Sites pages

      - name: Run unit tests
        run: pytest Tests -q
        continue-on-error: true

  lint:
    name: Lint (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: pip install flake8
      - name: Syntax & undefined name check
        run: |
          flake8 . --count --select=E9,F63,F7,F82 \
            --exclude=.git,__pycache__,.venv,venv \
            --show-source --statistics
