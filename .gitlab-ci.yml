stages:
  - verify

default:
  image: python:3.12

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

verify_streamlit_setup:
  stage: verify
  script:
    - python --version
    - pip install --no-cache-dir -r requirements.txt
    - streamlit --version
    - python -m py_compile main_site.py