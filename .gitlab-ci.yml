stages:
  - verify
  - test

default:
  image: python:3.12

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  DEBIAN_FRONTEND: "noninteractive"

.python_setup: &python_setup
  - apt-get update -qq
  - apt-get install -y --no-install-recommends
      python3-tk python3-dev scrot xvfb
      libxkbcommon0 libgbm1
  - python -m pip install --upgrade pip setuptools wheel
  - pip install --no-cache-dir -r requirements.txt

verify_streamlit_setup:
  stage: verify
  script:
    - *python_setup
    - python --version
    - streamlit --version
    - python -m compileall -q main_site.py Activity Common Request Sites pages

unit_tests:
  stage: test
  script:
    - *python_setup
    - Xvfb :99 -screen 0 1920x1080x24 &
    - export DISPLAY=:99
    - pytest Tests -q
  allow_failure: true
